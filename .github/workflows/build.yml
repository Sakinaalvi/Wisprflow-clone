name: Build binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: voxflow-linux-x64
          - os: windows-latest
            artifact: voxflow-windows-x64
          - os: macos-latest
            artifact: voxflow-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev python3-tk ffmpeg xdotool

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install portaudio ffmpeg

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller voxflow.spec --clean --noconfirm

      - name: Archive artifact (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd dist
          tar -czf ../${{ matrix.artifact }}.tar.gz voxflow

      - name: Archive artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          cd dist
          7z a ..\${{ matrix.artifact }}.zip voxflow

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
